<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A.X.I.S — Autonomous eXecution & Intelligence System</title>
  <meta name="description" content="A.X.I.S: Your locally-run AI agent with persistent memory, powered by Ollama." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="index.css" />
</head>
<body>

  <!-- ── SIDEBAR ─────────────────────────────────────── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo-mark">A</div>
      <div class="logo-text">
        <span class="logo-title">A.X.I.S</span>
        <span class="logo-sub">Intelligence System</span>
      </div>
    </div>

    <div class="sidebar-status" id="statusBox">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">Connecting…</span>
    </div>

    <div class="sidebar-section-title">Memory</div>
    <div class="memory-panel" id="memoryPanel">
      <p class="memory-empty">No memory retrieved yet.</p>
    </div>

    <div class="sidebar-actions">
      <button class="btn-clear" id="clearBtn">🗑 Clear Memory</button>
    </div>
  </aside>

  <!-- ── MAIN CHAT ──────────────────────────────────── -->
  <main class="main" id="main">
    <header class="topbar">
      <button class="topbar-toggle" id="sidebarToggle">☰</button>
      <div class="topbar-title">
        <span class="topbar-name">A.X.I.S</span>
        <span class="topbar-model" id="topbarModel">Connecting…</span>
      </div>
    </header>

    <div class="chat-feed" id="chatFeed">
      <!-- Intro card -->
      <div class="intro-card">
        <div class="intro-icon">🧠</div>
        <h2>A.X.I.S Online</h2>
        <p>Autonomous eXecution &amp; Intelligence System<br/>Powered by Ollama · ChromaDB Memory · FastAPI</p>
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrap">
        <textarea
          id="userInput"
          class="input-box"
          placeholder="Send a message…"
          rows="1"
        ></textarea>
        <button class="send-btn" id="sendBtn" title="Send">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
      <p class="input-hint">Running locally via Ollama · Memory persists across reloads</p>
    </div>
  </main>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="index.js"></script>
</body>
</html>
